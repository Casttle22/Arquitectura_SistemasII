apiVersion: apps/v1
kind: Deployment
metadata:
  name: miniapp
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: miniapp
  template:
    metadata:
      labels:
        app: miniapp
    spec:
      containers:
        - name: miniapp
          image: assignment-08-miniapp:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: miniapp
  namespace: app
spec:
  selector:
    app: miniapp
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: miniapp
  namespace: app
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`app.wesley-cardona.com`)
      kind: Rule
      services:
        - name: miniapp
          port: 80